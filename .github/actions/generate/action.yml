name: 'Makoto DBOM Generator'
description: 'Generate a Makoto DBOM (v0.1) for a data artifact via the Makoto Python SDK.'
author: 'makoto-project'

inputs:
  file:
    description: 'Path to the data file to generate the DBOM for'
    required: true
  dboms-dir:
    description: 'Output directory for the DBOM document'
    required: false
    default: 'dboms'
  signer:
    description: 'Signer identity recorded in the DBOM signature (e.g. github:<actor>). Defaults to github:${{ github.actor }}.'
    required: false
    default: ''
  uri:
    description: 'Source URI recorded in the DBOM source.uri. Defaults to file:// path.'
    required: false
    default: ''
  format:
    description: 'Data format (inferred from file extension if omitted).'
    required: false
    default: ''
  collector-id:
    description: 'Collector identifier URI recorded in the lineage tool field. Defaults to https://github.com/<repo>.'
    required: false
    default: ''
  dataset-version:
    description: 'Dataset version recorded in the lineage step description.'
    required: false
    default: '1.0.0'
  python-version:
    description: 'Python version for the setup-python step.'
    required: false
    default: '3.12'

outputs:
  dbom-path:
    description: 'Path to the generated DBOM JSON file'
    value: ${{ steps.generate.outputs.dbom-path }}
  sha256:
    description: 'SHA-256 of the data file (from the DBOM source.hash.value)'
    value: ${{ steps.generate.outputs.sha256 }}
  signer:
    description: 'Signer identity recorded in the DBOM'
    value: ${{ steps.generate.outputs.signer }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Makoto Python SDK
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r "${{ github.action_path }}/../../../requirements.txt"

    - name: Generate DBOM
      id: generate
      shell: bash
      env:
        ACT_FILE: ${{ inputs.file }}
        ACT_DBOMS_DIR: ${{ inputs.dboms-dir }}
        ACT_SIGNER: ${{ inputs.signer }}
        ACT_URI: ${{ inputs.uri }}
        ACT_FORMAT: ${{ inputs.format }}
        ACT_COLLECTOR_ID: ${{ inputs.collector-id }}
        ACT_VERSION: ${{ inputs.dataset-version }}
        REPO: ${{ github.repository }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        SCRIPT="${{ github.action_path }}/../../../scripts/generate_dbom.py"
        CMD=(python3 "$SCRIPT" "$ACT_FILE"
             --dboms-dir "$ACT_DBOMS_DIR"
             --version "$ACT_VERSION")
        if [ -n "$ACT_SIGNER" ]; then
          CMD+=(--signer "$ACT_SIGNER")
        else
          CMD+=(--signer "github:${ACTOR}")
        fi
        [ -n "$ACT_URI" ]    && CMD+=(--uri "$ACT_URI")
        [ -n "$ACT_FORMAT" ] && CMD+=(--format "$ACT_FORMAT")
        if [ -n "$ACT_COLLECTOR_ID" ]; then
          CMD+=(--collector-id "$ACT_COLLECTOR_ID")
        else
          CMD+=(--collector-id "https://github.com/${REPO}")
        fi
        "${CMD[@]}"

        name=$(basename "$ACT_FILE")
        name="${name%.*}"
        dbom_path="$ACT_DBOMS_DIR/$name.dbom.json"
        sha256=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['source']['hash']['value'])" "$dbom_path")
        signer=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['signature']['signer'])" "$dbom_path")
        {
          echo "dbom-path=$dbom_path"
          echo "sha256=$sha256"
          echo "signer=$signer"
        } >> "$GITHUB_OUTPUT"
